<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SereneCare | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#006978", "primary-dim": "#005c69",
          "primary-container": "#91eafd", "on-primary-container": "#005763",
          "secondary": "#605890", "secondary-container": "#e5deff", "on-secondary-container": "#534a81",
          "tertiary-container": "#fdcdb6", "on-tertiary-container": "#644332",
          "background": "#fcf9f6", "surface": "#fcf9f6",
          "surface-container-low": "#f6f3f0", "surface-container": "#f0eeea",
          "surface-container-high": "#eae8e4", "surface-container-highest": "#e4e2de",
          "surface-container-lowest": "#ffffff",
          "on-surface": "#323330", "on-surface-variant": "#5f5f5c",
          "outline-variant": "#b3b2ae", "error": "#a83836",
        },
        fontFamily: { "headline": ["Lexend"], "body": ["Lexend"] },
        borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
      }
    }
  }
</script>
<style>
  body { font-family: 'Lexend', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .fade-in { animation: fadeIn .6s cubic-bezier(.22,1,.36,1); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  .float-label input:focus + label,
  .float-label input:not(:placeholder-shown) + label {
    transform: translateY(-1.6rem) scale(0.78);
    color: #006978;
    background: white;
    padding: 0 4px;
  }
  .float-label label {
    transition: all .2s cubic-bezier(.22,1,.36,1);
    transform-origin: left top;
    pointer-events: none;
  }
  .input-field {
    transition: border-color .2s, box-shadow .2s;
  }
  .input-field:focus {
    border-color: #006978;
    box-shadow: 0 0 0 3px rgba(0,105,120,.1);
    outline: none;
  }
  .btn-primary {
    transition: all .2s cubic-bezier(.22,1,.36,1);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px -8px rgba(0,105,120,.4); }
  .btn-primary:active { transform: scale(.97); }
</style>
</head>

<body class="bg-background min-h-screen flex items-center justify-center px-4">

  <!-- Background decoration -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -right-32 w-96 h-96 rounded-full bg-primary-container/30"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 rounded-full bg-secondary-container/30"></div>
    <div class="absolute top-1/2 left-1/4 w-64 h-64 rounded-full bg-tertiary-container/20"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-md fade-in">
    <div class="bg-white/80 backdrop-blur-2xl rounded-[2rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.12)] p-10 border border-outline-variant/10">

      <!-- Logo -->
      <div class="flex flex-col items-center mb-10">
        <div class="w-16 h-16 bg-primary rounded-[1.25rem] flex items-center justify-center shadow-lg shadow-primary/30 mb-4">
          <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL' 1;">spa</span>
        </div>
        <h1 class="text-3xl font-black text-primary tracking-tight">SereneCare</h1>
        <p class="text-on-surface-variant font-medium mt-1 text-sm">Elderly Care Monitoring System</p>
      </div>

      <!-- Welcome text -->
      <div class="mb-8">
        <h2 class="text-xl font-bold text-on-surface">Welcome 👋</h2>
        <p class="text-on-surface-variant text-sm mt-1">Enter your details to start monitoring</p>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="hidden mb-4 bg-error/10 border border-error/20 rounded-xl p-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-error text-lg">error</span>
        <p class="text-sm font-medium text-error" id="error-text">Please fill all fields.</p>
      </div>

      <!-- Form -->
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">

        <!-- Caregiver Name -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">
            Caregiver Name <span class="text-error">*</span>
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl" style="font-variation-settings:'FILL' 1;">person</span>
            <input id="caregiver-name" type="text" placeholder="e.g. Amrit, Sarah…"
              class="input-field w-full bg-surface-container-low border border-outline-variant/40 rounded-xl py-3.5 pl-11 pr-4 text-on-surface font-medium placeholder:text-on-surface-variant/40 text-sm"/>
          </div>
        </div>

        <!-- Patient Name -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">
            Patient Name <span class="text-error">*</span>
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl" style="font-variation-settings:'FILL' 1;">elderly</span>
            <input id="patient-name" type="text" placeholder="e.g. Isha, Arthur…"
              class="input-field w-full bg-surface-container-low border border-outline-variant/40 rounded-xl py-3.5 pl-11 pr-4 text-on-surface font-medium placeholder:text-on-surface-variant/40 text-sm"/>
          </div>
        </div>

        <!-- Patient Age -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">
            Patient Age <span class="text-error">*</span>
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl" style="font-variation-settings:'FILL' 1;">cake</span>
            <input id="patient-age" type="number" min="1" max="120" placeholder="e.g. 80"
              class="input-field w-full bg-surface-container-low border border-outline-variant/40 rounded-xl py-3.5 pl-11 pr-4 text-on-surface font-medium placeholder:text-on-surface-variant/40 text-sm"/>
          </div>
        </div>

        <!-- Relationship (optional) -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1.5">
            Relationship <span class="text-on-surface-variant/50">(optional)</span>
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant text-xl" style="font-variation-settings:'FILL' 1;">family_restroom</span>
            <select id="relationship"
              class="input-field w-full bg-surface-container-low border border-outline-variant/40 rounded-xl py-3.5 pl-11 pr-4 text-on-surface font-medium text-sm appearance-none">
              <option value="Child">Child (Son/Daughter)</option>
              <option value="Spouse">Spouse</option>
              <option value="Sibling">Sibling</option>
              <option value="Professional Caregiver">Professional Caregiver</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="submit-btn"
          class="btn-primary w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 text-base mt-2">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">login</span>
          Start Monitoring
        </button>

      </form>

      <!-- Footer -->
      <p class="text-center text-xs text-on-surface-variant mt-6">
        Your data is stored locally and never shared.
      </p>
    </div>
  </div>

<script>
function handleLogin(e) {
  e.preventDefault();

  const caregiverName = document.getElementById('caregiver-name').value.trim();
  const patientName   = document.getElementById('patient-name').value.trim();
  const patientAge    = document.getElementById('patient-age').value.trim();
  const relationship  = document.getElementById('relationship').value;

  // Validate
  if (!caregiverName || !patientName || !patientAge) {
    document.getElementById('error-msg').classList.remove('hidden');
    document.getElementById('error-text').textContent = 'Please fill in all required fields.';
    return;
  }
  if (patientAge < 1 || patientAge > 120) {
    document.getElementById('error-msg').classList.remove('hidden');
    document.getElementById('error-text').textContent = 'Please enter a valid age.';
    return;
  }

  document.getElementById('error-msg').classList.add('hidden');

  // Save to localStorage
  const userData = { caregiverName, patientName, patientAge, relationship, loginTime: new Date().toLocaleString() };
  localStorage.setItem('serenecare_user', JSON.stringify(userData));

  // Button loading state
  const btn = document.getElementById('submit-btn');
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Setting up…';
  btn.disabled = true;

  // Redirect after short delay
  setTimeout(() => { window.location.href = '/caregiver'; }, 800);
}

// If already logged in, redirect
const existing = localStorage.getItem('serenecare_user');
if (existing) {
  // Optionally auto-redirect — commented out so user can re-login
  // window.location.href = '/caregiver';
}
</script>
</body>
</html>
